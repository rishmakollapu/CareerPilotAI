<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-container">

<h1>Create Account</h1>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Register

</button>

</form>

<br>

<a href="/login">

Already have an account?

</a>

</div>

</body>

</html>
